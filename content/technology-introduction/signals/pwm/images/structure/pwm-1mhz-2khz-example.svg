<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="820" viewBox="0 0 1200 820" role="img" aria-labelledby="title desc">
  <title id="title">PWM 1MHz to 2kHz Example</title>
  <desc id="desc">A handbook style PWM diagram showing a 1MHz timer clock, a counter from 0 to 499, compare register control, and example duty cycles from 10 percent to 50 percent at 2000Hz.</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .panel { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 18; }
      .block { fill: #eef6ff; stroke: #3b82f6; stroke-width: 2; rx: 14; }
      .block2 { fill: #f3fdf6; stroke: #16a34a; stroke-width: 2; rx: 14; }
      .note { fill: #fff7ed; stroke: #f59e0b; stroke-width: 2; rx: 14; }
      .title { font: 700 28px "Segoe UI", "Microsoft YaHei", sans-serif; fill: #0f172a; }
      .subtitle { font: 600 18px "Segoe UI", "Microsoft YaHei", sans-serif; fill: #1e293b; }
      .text { font: 16px "Segoe UI", "Microsoft YaHei", sans-serif; fill: #334155; }
      .small { font: 14px "Segoe UI", "Microsoft YaHei", sans-serif; fill: #475569; }
      .label { font: 700 16px "Segoe UI", "Microsoft YaHei", sans-serif; fill: #0f172a; }
      .wave { fill: none; stroke: #2563eb; stroke-width: 4; }
      .clock { fill: none; stroke: #0f766e; stroke-width: 4; }
      .axis { stroke: #94a3b8; stroke-width: 2; }
      .arrow { stroke: #64748b; stroke-width: 3; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b" />
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1200" height="820"/>

  <rect class="panel" x="30" y="24" width="1140" height="90"/>
  <text class="title" x="60" y="62">PWM Example: 1 MHz Timer Clock to 2000 Hz Output</text>
  <text class="text" x="60" y="94">Keep the period fixed at 500 us and vary only the high-level width. This changes duty cycle without changing PWM frequency.</text>

  <rect class="panel" x="30" y="136" width="1140" height="252"/>
  <text class="subtitle" x="60" y="170">1. Internal Working Idea</text>

  <text class="label" x="86" y="214">1 MHz Clock</text>
  <path class="clock" d="M80 250 L120 250 L120 220 L160 220 L160 250 L200 250 L200 220 L240 220 L240 250 L280 250 L280 220 L320 220 L320 250" />
  <text class="small" x="84" y="282">1 tick = 1 us</text>

  <path class="arrow" d="M330 236 L420 236" />

  <rect class="block" x="430" y="190" width="220" height="92" rx="14"/>
  <text class="label" x="468" y="224">Counter</text>
  <text class="text" x="455" y="248">Count from 0 to 499</text>
  <text class="small" x="455" y="270">500 ticks = 500 us period</text>

  <path class="arrow" d="M650 236 L752 236" />

  <rect class="block2" x="762" y="190" width="170" height="92" rx="14"/>
  <text class="label" x="805" y="224">Compare</text>
  <text class="text" x="787" y="248">Output high</text>
  <text class="small" x="790" y="270">when CNT &lt; CCR</text>

  <path class="arrow" d="M932 236 L1034 236" />

  <rect class="note" x="1044" y="190" width="88" height="92" rx="14"/>
  <text class="label" x="1062" y="224">PWM</text>
  <text class="text" x="1059" y="248">OUT</text>

  <rect class="panel" x="84" y="304" width="1020" height="58"/>
  <text class="text" x="110" y="340">This example uses: PSC = 0, ARR = 499, period = 500 us, PWM frequency = 2000 Hz, CCR range = 0 to 250 for 0% to 50% duty.</text>

  <rect class="panel" x="30" y="410" width="1140" height="380"/>
  <text class="subtitle" x="60" y="444">2. Same Frequency, Different Duty Cycles</text>

  <line class="axis" x1="110" y1="520" x2="1030" y2="520"/>
  <line class="axis" x1="110" y1="600" x2="1030" y2="600"/>
  <line class="axis" x1="110" y1="680" x2="1030" y2="680"/>

  <text class="label" x="60" y="500">10%</text>
  <text class="label" x="60" y="580">25%</text>
  <text class="label" x="60" y="660">50%</text>

  <path class="wave" d="M110 520 L110 480 L200 480 L200 520 L560 520 L560 480 L650 480 L650 520 L1010 520" />
  <path class="wave" d="M110 600 L110 560 L335 560 L335 600 L560 600 L560 560 L785 560 L785 600 L1010 600" />
  <path class="wave" d="M110 680 L110 640 L560 640 L560 680 L1010 680 L1010 640" />

  <line class="axis" x1="110" y1="745" x2="560" y2="745"/>
  <line class="axis" x1="560" y1="745" x2="1010" y2="745"/>
  <line class="axis" x1="110" y1="740" x2="110" y2="750"/>
  <line class="axis" x1="560" y1="740" x2="560" y2="750"/>
  <line class="axis" x1="1010" y1="740" x2="1010" y2="750"/>
  <text class="small" x="300" y="776">500 us</text>
  <text class="small" x="748" y="776">500 us</text>

  <text class="small" x="140" y="470">High width = 50 us, CCR = 50</text>
  <text class="small" x="140" y="550">High width = 125 us, CCR = 125</text>
  <text class="small" x="140" y="630">High width = 250 us, CCR = 250</text>

  <rect class="note" x="110" y="700" width="940" height="72" rx="14"/>
  <text class="label" x="138" y="728">How to read this example</text>
  <text class="small" x="360" y="724">Period stays at 500 us; frequency stays at 2000 Hz; only the high-level width changes; duty rises as CCR increases.</text>
  <text class="small" x="360" y="746">For 0% to 50% duty, set CCR within 0 to 250.</text>
</svg>
