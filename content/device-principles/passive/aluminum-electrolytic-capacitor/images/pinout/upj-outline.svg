<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 520" role="img" aria-labelledby="title desc">
  <title id="title">Aluminum electrolytic capacitor identification diagram</title>
  <desc id="desc">A simplified radial electrolytic capacitor diagram showing positive and negative leads, longer positive lead, negative polarity stripe, and sleeve markings for capacitance and voltage.</desc>
  <defs>
    <linearGradient id="body" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6a442d"/>
      <stop offset="100%" stop-color="#2d1d15"/>
    </linearGradient>
    <linearGradient id="bodyTop" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8a6042"/>
      <stop offset="100%" stop-color="#5b3b27"/>
    </linearGradient>
    <linearGradient id="lead" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#eef2f5"/>
      <stop offset="100%" stop-color="#9ca5ad"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 Z" fill="#5a534c"/>
    </marker>
    <style>
      .title { font: 700 22px Arial, sans-serif; fill: #2e2722; }
      .label { font: 700 18px Arial, sans-serif; fill: #2e2722; }
      .text { font: 15px Arial, sans-serif; fill: #564f49; }
      .small { font: 13px Arial, sans-serif; fill: #6b645d; }
      .mark { font: 700 32px Arial, sans-serif; fill: #f7efe6; letter-spacing: 1px; }
      .markSmall { font: 18px Arial, sans-serif; fill: #efe3d4; }
    </style>
  </defs>

  <rect width="920" height="520" rx="30" fill="#faf6f0"/>

  <text x="54" y="50" class="title">铝电解电容外观与极性识别示意</text>

  <ellipse cx="300" cy="120" rx="96" ry="30" fill="url(#bodyTop)"/>
  <rect x="204" y="120" width="192" height="188" rx="20" fill="url(#body)"/>
  <ellipse cx="300" cy="308" rx="96" ry="30" fill="#271912"/>

  <rect x="344" y="104" width="22" height="220" rx="8" fill="#dcc3a8"/>
  <text x="355" y="148" text-anchor="middle" class="markSmall">-</text>
  <text x="355" y="184" text-anchor="middle" class="markSmall">-</text>
  <text x="355" y="220" text-anchor="middle" class="markSmall">-</text>

  <text x="285" y="194" text-anchor="middle" class="mark">UPJ</text>
  <text x="285" y="228" text-anchor="middle" class="markSmall">100uF 25V</text>
  <text x="285" y="256" text-anchor="middle" class="markSmall">105C</text>

  <line x1="266" y1="308" x2="266" y2="430" stroke="url(#lead)" stroke-width="8" stroke-linecap="round"/>
  <line x1="332" y1="308" x2="332" y2="392" stroke="url(#lead)" stroke-width="8" stroke-linecap="round"/>

  <line x1="72" y1="412" x2="324" y2="412" stroke="#9d4b18" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="52" y="406" class="label">长脚</text>
  <text x="52" y="430" class="text">通常作为正极</text>

  <line x1="76" y1="372" x2="258" y2="372" stroke="#7f2018" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="52" y="366" class="label">短脚</text>
  <text x="52" y="390" class="text">通常靠近负极色带</text>

  <line x1="170" y1="74" x2="430" y2="74" stroke="#5a534c" stroke-width="2" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
  <line x1="204" y1="86" x2="204" y2="108" stroke="#5a534c" stroke-width="2"/>
  <line x1="396" y1="86" x2="396" y2="108" stroke="#5a534c" stroke-width="2"/>
  <text x="300" y="64" text-anchor="middle" class="text">D: 罐体直径</text>

  <line x1="266" y1="340" x2="332" y2="340" stroke="#5a534c" stroke-width="2" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
  <line x1="266" y1="318" x2="266" y2="334" stroke="#5a534c" stroke-width="2"/>
  <line x1="332" y1="318" x2="332" y2="334" stroke="#5a534c" stroke-width="2"/>
  <text x="299" y="332" text-anchor="middle" class="text">P: 引脚间距</text>

  <line x1="160" y1="120" x2="160" y2="308" stroke="#5a534c" stroke-width="2" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
  <line x1="170" y1="120" x2="194" y2="120" stroke="#5a534c" stroke-width="2"/>
  <line x1="170" y1="308" x2="194" y2="308" stroke="#5a534c" stroke-width="2"/>
  <text x="108" y="220" class="text">L: 罐体长度</text>

  <line x1="560" y1="158" x2="370" y2="158" stroke="#7f2018" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="572" y="150" class="label">负极色带</text>
  <text x="572" y="174" class="text">带 “-” 的一侧为负极</text>

  <line x1="560" y1="232" x2="366" y2="232" stroke="#6b4f36" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="572" y="224" class="label">壳体印字</text>
  <text x="572" y="248" class="text">可读系列、容量、耐压</text>

  <rect x="508" y="386" width="336" height="98" rx="18" fill="#fffdf9" stroke="#e4d8c9"/>
  <text x="530" y="414" class="label">如何看这个电容</text>
  <circle cx="548" cy="438" r="10" fill="#9d4b18"/>
  <text x="568" y="443" class="small">长脚一般看作正极</text>
  <circle cx="548" cy="460" r="10" fill="#7f2018"/>
  <text x="568" y="465" class="small">负极色带一侧是负极</text>
  <text x="700" y="438" class="small">印字示例：100uF 25V</text>
  <text x="700" y="460" class="small">UPJ 是系列名，不是单一容量值</text>
</svg>
