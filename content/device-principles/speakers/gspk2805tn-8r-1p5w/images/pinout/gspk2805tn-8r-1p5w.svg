<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 520" role="img" aria-labelledby="title desc">
  <title id="title">GSPK2805TN 8R 1.5W speaker identification diagram</title>
  <desc id="desc">Simplified micro speaker diagram showing front sound outlet, solder pads, and basic identification notes.</desc>
  <defs>
    <linearGradient id="body" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#383d45"/>
      <stop offset="100%" stop-color="#181c21"/>
    </linearGradient>
    <style>
      .title { font: 700 22px Arial, sans-serif; fill: #2e2722; }
      .label { font: 700 18px Arial, sans-serif; fill: #2e2722; }
      .text { font: 15px Arial, sans-serif; fill: #564f49; }
      .small { font: 13px Arial, sans-serif; fill: #6b645d; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 Z" fill="#5a534c"/>
    </marker>
  </defs>

  <rect width="920" height="520" rx="30" fill="#faf6f0"/>
  <text x="54" y="46" class="title">GSPK2805TN-8R1.5W 外观与接线示意</text>

  <rect x="270" y="92" width="260" height="190" rx="18" fill="url(#body)"/>
  <circle cx="400" cy="186" r="70" fill="#24292f" stroke="#575f67" stroke-width="4"/>
  <circle cx="400" cy="186" r="42" fill="#1a1e23" stroke="#626a72" stroke-width="3"/>
  <circle cx="400" cy="186" r="10" fill="#737b83"/>
  <rect x="316" y="286" width="34" height="18" rx="4" fill="#d2a85e"/>
  <rect x="450" y="286" width="34" height="18" rx="4" fill="#d2a85e"/>
  <text x="332" y="328" text-anchor="middle" class="label">+</text>
  <text x="466" y="328" text-anchor="middle" class="label">-</text>

  <line x1="92" y1="150" x2="328" y2="150" stroke="#5a534c" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="54" y="142" class="label">出音孔</text>
  <text x="54" y="164" class="text">正面中心区域为声音输出面</text>

  <line x1="92" y1="214" x2="330" y2="214" stroke="#7f2018" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="54" y="206" class="label">外形尺寸</text>
  <text x="54" y="228" class="text">约 28mm x 5mm 小型扬声器</text>

  <line x1="92" y1="296" x2="330" y2="296" stroke="#a24d1b" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="54" y="288" class="label">焊盘端子</text>
  <text x="54" y="310" class="text">两端焊盘用于连接音频驱动信号</text>

  <line x1="562" y1="142" x2="470" y2="142" stroke="#5a534c" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="576" y="134" class="label">阻抗</text>
  <text x="576" y="156" class="text">8Ω</text>

  <line x1="562" y1="196" x2="470" y2="196" stroke="#7f2018" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="576" y="188" class="label">额定功率</text>
  <text x="576" y="210" class="text">1.5W</text>

  <line x1="562" y1="250" x2="470" y2="250" stroke="#5e646a" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="576" y="242" class="label">谐振频率</text>
  <text x="576" y="264" class="text">约 650Hz</text>

  <rect x="72" y="438" width="776" height="56" rx="16" fill="#fffdf9" stroke="#e4d8c9"/>
  <text x="94" y="460" class="label">如何看这个扬声器</text>
  <circle cx="300" cy="455" r="9" fill="#a24d1b"/>
  <text x="316" y="460" class="small">先认出音面，再确认焊盘位置</text>
  <circle cx="540" cy="455" r="9" fill="#7f2018"/>
  <text x="556" y="460" class="small">阻抗、功率和尺寸是选型时最关键的三项</text>
  <text x="94" y="482" class="small">本页参数按 LCSC 商品页整理，实际设计前建议再核对厂家资料。</text>
</svg>
