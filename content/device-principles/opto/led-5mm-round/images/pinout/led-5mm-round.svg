<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 520" role="img" aria-labelledby="title desc">
  <title id="title">5mm Round LED identification diagram</title>
  <desc id="desc">Simplified 5mm round LED diagram with title, model, and notes. Shows longer anode lead, shorter cathode lead, flat edge, and internal electrodes.</desc>
  <defs>
    <linearGradient id="ledBody" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffd7cc"/>
      <stop offset="100%" stop-color="#ff7a5e"/>
    </linearGradient>
    <linearGradient id="lead" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#eef2f5"/>
      <stop offset="100%" stop-color="#9ca5ad"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 Z" fill="#5a534c"/>
    </marker>
    <style>
      .title { font: 700 22px Arial, sans-serif; fill: #2e2722; }
      .label { font: 700 18px Arial, sans-serif; fill: #2e2722; }
      .text { font: 15px Arial, sans-serif; fill: #564f49; }
      .small { font: 13px Arial, sans-serif; fill: #6b645d; }
    </style>
  </defs>

  <rect width="920" height="520" rx="30" fill="#faf6f0"/>

  <text x="54" y="46" class="title">5mm LED 外观与极性识别示意</text>

  <path d="M286 136 C286 84 326 64 360 64 C394 64 434 84 434 136 L434 170 L286 170 Z" fill="url(#ledBody)" stroke="#8d2b20" stroke-width="3"/>
  <path d="M286 170 H434 V194 C434 214 418 230 398 230 H322 C302 230 286 214 286 194 Z" fill="#f6b2a3" stroke="#8d2b20" stroke-width="3"/>
  <path d="M286 122 L286 198" stroke="#8d2b20" stroke-width="4"/>
  <line x1="334" y1="230" x2="334" y2="408" stroke="url(#lead)" stroke-width="8" stroke-linecap="round"/>
  <line x1="386" y1="230" x2="386" y2="370" stroke="url(#lead)" stroke-width="8" stroke-linecap="round"/>
  <rect x="318" y="150" width="14" height="62" rx="4" fill="#d2d7dc"/>
  <rect x="382" y="132" width="28" height="82" rx="6" fill="#bac4ca"/>
  <path d="M332 170 H382" stroke="#d2d7dc" stroke-width="5" stroke-linecap="round"/>

  <line x1="76" y1="356" x2="376" y2="356" stroke="#a24d1b" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="52" y="348" class="label">长脚</text>
  <text x="52" y="370" class="text">通常作为正极 Anode</text>

  <line x1="76" y1="398" x2="324" y2="398" stroke="#7f2018" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="52" y="390" class="label">短脚</text>
  <text x="52" y="412" class="text">通常作为负极 Cathode</text>

  <line x1="522" y1="116" x2="292" y2="116" stroke="#5a534c" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="536" y="108" class="label">平边</text>
  <text x="536" y="130" class="text">壳体平边通常对应负极侧</text>

  <line x1="522" y1="170" x2="396" y2="170" stroke="#7f2018" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="536" y="162" class="label">大金属片</text>
  <text x="536" y="184" class="text">内部较大的电极一般是负极侧</text>

  <line x1="522" y1="224" x2="324" y2="224" stroke="#5e646a" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="536" y="216" class="label">小金属柱</text>
  <text x="536" y="238" class="text">内部较小的电极一般连正极</text>

  <rect x="72" y="438" width="776" height="56" rx="16" fill="#fffdf9" stroke="#e4d8c9"/>
  <text x="94" y="460" class="label">如何看这个 LED</text>
  <circle cx="282" cy="455" r="9" fill="#a24d1b"/>
  <text x="298" y="460" class="small">长脚一般看作正极</text>
  <circle cx="480" cy="455" r="9" fill="#7f2018"/>
  <text x="496" y="460" class="small">短脚、平边、大金属片一般对应负极</text>
  <text x="94" y="482" class="small">注意：剪脚后优先看平边和内部电极，不只看长短脚。</text>
</svg>
